name: Backfill moderation for existing open PRs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, only log decisions; do not merge/close.'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Process every open PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const dryRun = (core.getInput('dry_run') || 'false') === 'true'
                        || context.payload.inputs?.dry_run === 'true';
            const isCopilot = (login) => /^copilot(\b|-|\[)/i.test(login || '');

            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100,
            });
            core.info(`Found ${prs.length} open PRs. dryRun=${dryRun}`);

            for (const pr of prs) {
              const prNumber = pr.number;
              const parts = [];

              const reviews = await github.paginate(
                github.rest.pulls.listReviews,
                { owner, repo, pull_number: prNumber, per_page: 100 }
              );
              for (const r of reviews) {
                if (isCopilot(r.user?.login)) parts.push(r.body || '');
              }

              const inline = await github.paginate(
                github.rest.pulls.listReviewComments,
                { owner, repo, pull_number: prNumber, per_page: 100 }
              );
              for (const c of inline) {
                if (isCopilot(c.user?.login)) parts.push(c.body || '');
              }

              const issueComments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number: prNumber, per_page: 100 }
              );
              for (const c of issueComments) {
                if (isCopilot(c.user?.login)) parts.push(c.body || '');
              }

              if (parts.length === 0) {
                core.info(`PR #${prNumber}: no Copilot review yet — skipping.`);
                continue;
              }

              const text = parts.join('\n').toLowerCase();
              const isSpam = /\bspam\b/.test(text);
              core.info(`PR #${prNumber}: isSpam=${isSpam}`);

              if (dryRun) continue;

              try {
                if (isSpam) {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: prNumber,
                    body: 'Auto-closing (backfill): Copilot flagged this submission as spam.',
                  });
                  await github.rest.pulls.update({
                    owner, repo, pull_number: prNumber, state: 'closed',
                  });
                  if (pr.head.repo && pr.head.repo.full_name === `${owner}/${repo}`) {
                    await github.rest.git.deleteRef({
                      owner, repo, ref: `heads/${pr.head.ref}`,
                    }).catch((e) => core.warning(`Branch delete failed for #${prNumber}: ${e.message}`));
                  }
                } else {
                  await github.rest.pulls.merge({
                    owner, repo, pull_number: prNumber, merge_method: 'merge',
                  });
                }
              } catch (e) {
                core.warning(`PR #${prNumber} action failed: ${e.message}`);
              }
            }
